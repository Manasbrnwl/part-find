version: '3.8'

services:
  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: part-find-api
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-4000}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-partfind}:${POSTGRES_PASSWORD:-partfind123}@postgres:5432/${POSTGRES_DB:-partfind_db}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_URL=redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379
    depends_on:
      - redis
      - postgres
    volumes:
      - ./uploads:/app/uploads
    networks:
      - part-find-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: part-find-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-partfind}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-partfind123}
      - POSTGRES_DB=${POSTGRES_DB:-partfind_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - part-find-network

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: part-find-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - part-find-network

volumes:
  postgres_data:
  redis_data:

networks:
  part-find-network:
    driver: bridge
